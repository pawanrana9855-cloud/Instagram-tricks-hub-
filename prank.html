    <style>

            background-color: #0a0a0a;
            color: #00ff00;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #111;
            padding: 30px;
            border-radius: 16px;
            border: 2px solid #333;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            transition: all 0.3s;
        }
        h1 {
            font-size: 24px;
            color: #fff;
            margin-bottom: 10px;
        }
        p {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
        }

        /* 1 Minute Loading Circle */
        .loader-box {
            display: none;
        }
        .circle-loader {
            width: 80px;
            height: 80px;
            border: 5px solid #222;
            border-top: 5px solid #00ff00;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-text {
            font-size: 16px;
            color: #00ff00;
        }

        /* Matrix Coding Screen */
        #matrixScreen {

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            padding: 20px;

            overflow-y: hidden;
            text-align: left;
            font-size: 13px;
            line-height: 1.5;
            z-index: 999;
        }

        .popup-overlay {

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .prank-popup {
            background: #111;
            border: 3px solid #ff0055;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.5);
        }
        .prank-popup h2 {
            color: #ff0055;
            font-size: 32px;
            margin-bottom: 15px;
        }
        .prank-popup p {
            color: #fff;
            font-size: 16px;
            margin-bottom: 25px;
        }
        .close-btn {
            background: #ff0055;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 85, 0.4);
        }
    </style>
</head>
