<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Optimizer</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #00ff00;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .box {
            background: #111;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
            max-width: 400px;
            width: 90%;
        }
        .btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
        }
        #loader {
            display: none;
            font-size: 18px;
            margin-top: 20px;
            color: #00ff00;
        }
        #popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            border: 2px solid #ff0055;
            padding: 30px;
            border-radius: 10px;
            color: #fff;
            width: 80%;
            max-width: 350px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="box" id="mainBox">
        <h2>System Optimizer Pro</h2>
        <p style="color: #888;">Clean junk files instantly.</p>
        <button class="btn" id="startBtn" onclick="startLoading()">🚀 Start Optimization</button>
        <div id="loader">Processing... <span id="count">0</span>%</div>
    </div>

    <div id="popup">
        <h2 style="color: #ff0055; margin: 0 0 10px 0;">😜 Prank Hogya!</h2>
        <p>Chill bhai! Koi data kahin nahi gaya hai. Yeh bas ek mazedaar prank page hai! 👑</p>
        <button class="btn" style="background: #ff0055; color: #fff;" onclick="location.reload()">Back</button>
    </div>

    <script>
        function startLoading() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            let num = 0;
            const countDisplay = document.getElementById('count');

            const timer = setInterval(() => {
                num++;
                countDisplay.innerText = num;

                if (num >= 100) {
                    clearInterval(timer);
                    document.getElementById('mainBox').style.display = 'none';
                    document.getElementById('popup').style.display = 'block';
                }
            }, 100);
        }
    </script>
</body>
</html>
